name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rustfmt
        run: cargo fmt --all --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: --cfg doc_cfg

  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - 1.88.0
          - stable
          - beta
          - nightly
    steps:
      - *checkout
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Install cargo-all-features
        run: cargo install cargo-all-features
      - run: cargo build --verbose
      - run: cargo test --verbose
      - name: All-features Test
        run: |
          cargo all-features test
          cargo all-features test --release
      - name: Sanitizers Test
        if: matrix.toolchain == 'nightly'
        run: |
          rustup component add rust-src
          for args in "" "-F compact-mono"; do
            for flags in "--cfg tsan -Z sanitizer=thread" "-Z sanitizer=leak" "-Z sanitizer=address"; do
              RUSTFLAGS="$flags" cargo test $args \
                -Z build-std --target x86_64-unknown-linux-gnu --lib --tests
            done
          done
      - name: Miri Test
        if: matrix.toolchain == 'nightly'
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-symbolic-alignment-check -Zmiri-tree-borrows"
        run: |
          rustup component add miri
          cargo miri test
          cargo miri test -F compact-mono
      - name: No-std Build Test
        if: matrix.toolchain == 'stable'
        run: |
          cargo install cross
          RUSTFLAGS="--cfg portable_atomic_unsafe_assume_single_core" \
            cross build -F portable-atomic --target thumbv6m-none-eabi
      - name: Loom Test
        if: matrix.toolchain == 'stable'
        env:
          RUSTFLAGS: "--cfg loom"
        run: |
          cargo test --lib --tests --release
          cargo test -F compact-mono --lib --tests --release

  tests-on-multi-platforms:
    name: Tests on Multiple Platforms
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - *checkout
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-all-features
        run: cargo install cargo-all-features
      - name: All-features Test
        run: |
          cargo all-features test --target ${{ matrix.target }}
          cargo all-features test --target ${{ matrix.target }} --release

  dependabot:
    name: Dependabot auto-merge
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    needs: [style, docs, tests, tests-on-multi-platforms]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: write
    steps:
      - name: Approve and merge
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --squash --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
